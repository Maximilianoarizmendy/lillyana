<h2>Lista de Miembros</h2>
<button class="btn btn-primary mb-3 spa-link" data-url="{% url 'gym:miembro_create' %}">Nuevo Miembro</button>
<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Nombre Completo</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Membresía</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for miembro in miembros %}
        <tr>
            <td>{{ miembro.nombre }} {{ miembro.apellido }}</td>
            <td>{{ miembro.email }}</td>
            <td>{{ miembro.telefono }}</td>
            <td>{{ miembro.membresia|default:"Ninguna" }}</td>
            <td>
                <form action="{% url 'gym:miembro_delete' miembro.pk %}" method="post" class="d-inline spa-form">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('¿Seguro que deseas eliminar este miembro?');">Eliminar</button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-center">No hay miembros registrados.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
