<h2>Planes Nutricionales</h2>
<button class="btn btn-primary-custom mb-3 spa-link" data-url="{% url 'gym:plan_nutricional_create' %}">Asignar Nuevo Plan</button>
<div class="glass-card p-4">
    <table class="table table-dark table-hover table-borderless">
        <thead>
            <tr>
                <th>Paciente (Miembro)</th>
                <th>Peso (kg)</th>
                <th>Altura (cm)</th>
                <th>Actualizado</th>
            </tr>
        </thead>
        <tbody>
            {% for plan in planes %}
            <tr>
                <td>{{ plan.miembro }}</td>
                <td>{{ plan.peso_kg }}</td>
                <td>{{ plan.altura_cm }}</td>
                <td>{{ plan.fecha_actualizacion }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted py-4">No hay planes registrados aún.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
