<div class="row justify-content-center mt-3">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0 text-gradient">{% if form.instance.pk %}Editar{% else %}Nuevo{% endif %} Registro</h2>
            <button type="button" class="btn btn-outline-light btn-sm rounded-pill px-3 spa-link" data-url="{% url 'gym:miembro_list' %}">Volver</button>
        </div>
        <div class="premium-card p-5">
            <form method="post" action="{% if form.instance.pk %}{% url 'gym:miembro_edit' form.instance.pk %}{% else %}{% url 'gym:miembro_create' %}{% endif %}" class="spa-form">
                {% csrf_token %}
                <div class="row g-4">
                    {% for field in form %}
                    <div class="col-md-6">
                        <label class="form-label text-muted small text-uppercase fw-bold mb-1" style="letter-spacing: 0.5px;">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                        <small class="form-text text-muted mt-1 d-block">{{ field.help_text }}</small>
                        {% endif %}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                <hr class="my-4" style="border-color: var(--border-color);">
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-premium rounded-pill px-5">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
