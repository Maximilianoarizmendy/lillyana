{% extends "base.html" %}

{% block title %}Iniciar Sesión - Tone Trainer{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card premium-card p-5">
            <div class="text-center mb-4">
                <i class="bi bi-activity text-gradient" style="font-size: 3rem;"></i>
                <h3 class="fw-bold mt-2">Bienvenido a Tone Trainer</h3>
                <p class="text-muted small">Ingresa tus credenciales para continuar</p>
            </div>
            <div class="card-body p-0">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label text-muted">Usuario</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label text-muted">Contraseña</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn btn-premium w-100 rounded-pill py-2 mb-3">Ingresar a la plataforma</button>
                </form>
                <div class="text-center">
                    <p class="text-muted small mb-0">¿No tienes cuenta? <a href="{% url 'registro' %}" class="text-primary text-decoration-none fw-bold">Regístrate aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
